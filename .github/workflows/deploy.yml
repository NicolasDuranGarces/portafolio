name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  IMAGE_NAME: portfolio
  CONTAINER_NAME: portfolio
  APP_PORT: 80
  HOST_PORT: ${{ vars.PROD_HOST_PORT || '2320' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & type check
        run: |
          npx tsc --noEmit
          npx eslint src --ext .ts,.tsx

      - name: Unit tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: validate
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker access
        shell: bash
        run: |
          set -euo pipefail
          docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail

          docker buildx build \
            --pull \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            --tag "$IMAGE_NAME:latest" \
            --load \
            .

      - name: Deploy container
        shell: bash
        run: |
          set -euo pipefail

          docker rm -f "$CONTAINER_NAME" portfolio_web 2>/dev/null || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --user "101:101" \
            --read-only \
            --tmpfs /var/cache/nginx:mode=1777,size=64M \
            --tmpfs /var/run:mode=1777,size=8M \
            --tmpfs /tmp:mode=1777,size=32M \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            --cap-add NET_BIND_SERVICE \
            --memory 256m \
            --cpus 0.5 \
            -p "$HOST_PORT:$APP_PORT" \
            "$IMAGE_NAME:${GITHUB_SHA}"

      - name: Verify deployment health
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for container health check..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo 'missing')
            echo "Attempt $i/12 - status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Deployment healthy on port $HOST_PORT"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container unhealthy. Last logs:"
              docker logs --tail 50 "$CONTAINER_NAME"
              exit 1
            fi
            sleep 10
          done

          echo "Health check timed out"
          docker logs --tail 50 "$CONTAINER_NAME" || true
          exit 1

      - name: Prune old Docker images
        if: success()
        shell: bash
        run: docker image prune -f --filter "until=168h"
